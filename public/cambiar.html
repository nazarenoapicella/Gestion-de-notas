<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambiar contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styleLogin.css">
</head>

<body>

<div class="bg-decor" aria-hidden="true">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
</div>

<div class="container">

  <div class="logo">
    <div class="logo-badge">ET</div>
    <h1>ET N°35</h1>
    <p>Ingeniero Eduardo Latzina</p>
  </div>

  <h2 class="form-title">Nueva contraseña</h2>
  <p class="form-desc">
    Por seguridad, debés cambiar tu contraseña antes de continuar.
  </p>

  <form id="cambiarForm">
    <div class="field">
      <label for="pass">Nueva contraseña</label>
      <input
        type="password"
        id="pass"
        placeholder="Mínimo 6 caracteres"
        minlength="6"
        required
        autocomplete="new-password"
      >
    </div>
    <p class="error" id="errorMsg"></p>
    <button type="submit"><span>Guardar contraseña</span></button>
  </form>

  <div class="footer">Sistema institucional escolar</div>

</div>

<script src="api.js"></script>
<script>
  const urlParams  = new URLSearchParams(location.search);
  const userParam  = urlParams.get("usuario");
  const storedUser = localStorage.getItem("usuario");
  const token      = localStorage.getItem("token");
  const errorMsg   = document.getElementById("errorMsg");

  if (!token || !storedUser || storedUser !== userParam) {
    alert("Acción no autorizada.");
    location.href = "index.html";
  }

  document.getElementById("cambiarForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const nuevaPassword = document.getElementById("pass").value;

    if (nuevaPassword.length < 6) {
      errorMsg.textContent  = "La contraseña debe tener al menos 6 caracteres.";
      errorMsg.style.display = "block";
      return;
    }

    errorMsg.style.display = "none";

    try {
      const res = await apiFetch("/api/cambiar-password", {
        method: "POST",
        body: JSON.stringify({ nuevaPassword })
      });

      if (!res) return;

      const data = await res.json();

      if (data.success) {
        localStorage.clear();
        location.href = "index.html";
      } else {
        errorMsg.textContent  = data.message || "Error al cambiar la contraseña.";
        errorMsg.style.display = "block";
      }

    } catch (err) {
      console.error("Error:", err);
      errorMsg.textContent  = "Error de conexión. Intentá de nuevo.";
      errorMsg.style.display = "block";
    }
  });
</script>

</body>
</html>
