<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planilla</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }

    body { background: #ececec; }

    .header {
      background: #111; color: white; padding: 22px 30px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 10px rgba(0,0,0,.15);
    }
    .left-header h1 { font-size: 28px; }
    .left-header p  { color: #ccc; font-size: 13px; }
    .left-header span { display: block; margin-top: 8px; font-size: 14px; color: #d5d5d5; }

    .volver-btn {
      border: none; background: white; color: #111;
      padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: bold;
    }

    .container { padding: 25px; }

    .table-container {
      background: white; border-radius: 20px; padding: 20px;
      overflow: auto; box-shadow: 0 5px 18px rgba(0,0,0,.12);
      margin-bottom: 25px;
    }

    table { width: 100%; min-width: 1800px; border-collapse: collapse; }
    thead { background: #111; color: white; }
    th, td { border-bottom: 1px solid #ddd; padding: 15px; text-align: center; vertical-align: top; }

    .eval { background: #f4f4f4; border-radius: 10px; padding: 10px; margin-bottom: 8px; }
    .eval-saldada { opacity: 0.45; text-decoration: line-through; }
    .eval-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .eval-tipo { font-weight: 700; color: #111; font-size: 13px; text-align: left; }
    .eval-nota { background: #111; color: white; padding: 3px 9px; border-radius: 999px; font-size: 12px; font-weight: bold; white-space: nowrap; }
    .eval-nota-roja { background: #c00 !important; }
    .eval-nota-gris { background: #999 !important; }
    .eval-nota-verde { background: #1a7a1a !important; }
    .eval-desc { font-size: 12px; color: #555; line-height: 1.4; margin-bottom: 6px; text-align: left; }
    .eval-acum-badge { display: inline-block; background: #1a73e8; color: white; font-size: 10px; padding: 2px 7px; border-radius: 999px; margin-bottom: 5px; }
    .eval-cierre-badge { display: inline-block; color: white; font-size: 10px; padding: 2px 7px; border-radius: 999px; margin-bottom: 5px; }
    .eval-cierre-badge.dic { background: #7b1fa2; }
    .eval-cierre-badge.feb { background: #e65100; }
    .eval button { margin-top: 6px; background: #c00; color: white; border: none; padding: 5px 10px; border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .eval button:hover { background: #a00; }

    .bim-resumen { margin-top: 10px; padding-top: 8px; border-top: 2px solid #ddd; background: #f9f9f9; border-radius: 0 0 8px 8px; }
    .bim-resumen-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .bim-resumen-valor { font-size: 17px; font-weight: 800; color: #111; }
    .bim-resumen-valor.desaprobado { color: #c00; }
    .bim-resumen-valor.aprobado    { color: #1a7a1a; }

    .cierre-resumen { margin-top: 8px; padding-top: 6px; border-top: 2px solid #e1bee7; background: #f9f0ff; border-radius: 0 0 8px 8px; }
    .cierre-resumen-label { font-size: 10px; color: #7b1fa2; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .cierre-resumen-valor { font-size: 14px; font-weight: 800; }
    .cierre-resumen-valor.aprobado    { color: #1a7a1a; }
    .cierre-resumen-valor.desaprobado { color: #c00; }

    .prom { font-weight: bold; color: #111; font-size: 18px; }
    .nota-previa { color: #c00 !important; font-size: 15px !important; }

    /* ── Formulario global de notas ── */
    .global-form {
      background: white; padding: 25px; border-radius: 20px;
      margin-bottom: 25px; box-shadow: 0 5px 18px rgba(0,0,0,.12);
    }
    .global-form h2 { margin-bottom: 20px; color: #111; }

    .form-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px; margin-bottom: 20px;
    }
    .form-grid input, .form-grid select { padding: 12px; border-radius: 10px; border: 1px solid #ccc; }

    .acum-row { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; flex-wrap: wrap; }
    .acum-row label { font-size: 14px; font-weight: 600; color: #333; display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .acum-row select { padding: 10px; border-radius: 10px; border: 1px solid #ccc; font-size: 14px; }

    .alumno-global { display: flex; align-items: center; justify-content: space-between; gap: 15px; padding: 12px; border-bottom: 1px solid #eee; }
    .alumno-global input { width: 90px; padding: 8px; }

    .global-btn { margin-top: 20px; background: #111; color: white; border: none; padding: 12px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .global-btn:hover { background: #333; }

    /* ── Formulario de cierres ── */
    .cierre-form {
      background: white; padding: 25px; border-radius: 20px;
      margin-top: 25px; box-shadow: 0 5px 18px rgba(0,0,0,.12);
      border-left: 5px solid #7b1fa2;
    }
    .cierre-form h2 { margin-bottom: 6px; color: #7b1fa2; }
    .cierre-subtitulo { font-size: 13px; color: #888; margin-bottom: 20px; }

    .cierre-tabs { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .cierre-tab {
      padding: 8px 20px; border-radius: 20px; border: 2px solid #7b1fa2;
      background: white; color: #7b1fa2; cursor: pointer; font-weight: 600; font-size: 13px;
      transition: .15s;
    }
    .cierre-tab.activo { background: #7b1fa2; color: white; }
    .cierre-tab:disabled { opacity: 0.4; cursor: not-allowed; }

    .cierre-badge-count {
      display: inline-block; background: rgba(255,255,255,0.3);
      color: inherit; font-size: 11px; font-weight: 800;
      padding: 1px 7px; border-radius: 999px; margin-left: 6px;
    }
    .cierre-tab:not(.activo) .cierre-badge-count { background: #7b1fa2; color: white; }

    /* Fila de selects del cierre */
    .cierre-fila {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 0; border-bottom: 1px solid #eee; flex-wrap: wrap;
    }
    .cierre-fila select {
      padding: 10px 12px; border-radius: 10px; border: 1px solid #ccc;
      font-size: 14px; min-width: 180px; flex: 1;
    }
    .cierre-fila input[type="number"] {
      width: 100px; padding: 10px; border-radius: 10px;
      border: 1px solid #ccc; font-size: 14px;
    }
    .cierre-fila button {
      background: #7b1fa2; color: white; border: none;
      padding: 10px 18px; border-radius: 10px; cursor: pointer;
      font-weight: 600; font-size: 14px; white-space: nowrap;
    }
    .cierre-fila button:hover { background: #6a1b9a; }
    .cierre-fila .alumno-label {
      font-weight: 700; font-size: 14px; min-width: 160px;
    }

    .cierre-btn { margin-top: 20px; background: #7b1fa2; color: white; border: none; padding: 12px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .cierre-btn:hover { background: #6a1b9a; }

    .sin-pendientes { color: #888; font-size: 14px; padding: 12px 0; }
  </style>
</head>

<body>

<div class="header">
  <div class="left-header">
    <h1 id="materiaTitulo">Materia</h1>
    <p>ET N°35 Ingeniero Eduardo Latzina</p>
    <span id="materiaInfo"></span>
  </div>
  <button class="volver-btn" onclick="history.back()">Volver</button>
</div>

<div class="container">

  <!-- Formulario de evaluaciones regulares -->
  <div class="global-form" id="globalForm" style="display:none;">
    <h2>Carga global de notas</h2>
    <div class="form-grid">
      <input type="text" id="globalDescripcion" placeholder="Tema / descripción">
      <select id="globalTipo">
        <option value="Examen escrito">Examen escrito</option>
        <option value="Oral">Oral</option>
        <option value="TP">Trabajo práctico</option>
        <option value="Participacion +0.5">Participación +0.5</option>
        <option value="Participacion +1">Participación +1</option>
        <option value="Participacion -0.5">Participación -0.5</option>
      </select>
      <select id="globalBimestre">
        <option value="1">1er Bimestre</option>
        <option value="2">2do Bimestre</option>
        <option value="3">3er Bimestre</option>
        <option value="4">4to Bimestre</option>
      </select>
    </div>
    <div class="acum-row">
      <label>
        <input type="checkbox" id="globalEsAcumulativo" onchange="actualizarSelectOrigen()">
        Esta evaluación es acumulativa de una anterior
      </label>
      <div id="origenContenedor" style="display:none;">
        <select id="globalEvaluacionOrigen"></select>
      </div>
    </div>
    <div id="globalAlumnos"></div>
    <button class="global-btn" onclick="guardarGlobal()">Guardar evaluación global</button>
  </div>

  <!-- Tabla de planilla -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Alumno</th>
          <th>1er Bimestre</th>
          <th>2do Bimestre</th>
          <th>1er Cuatrimestre</th>
          <th>3er Bimestre</th>
          <th>4to Bimestre</th>
          <th>2do Cuatrimestre</th>
          <th>1er Cierre (Dic.)</th>
          <th>2do Cierre (Feb.)</th>
          <th>Nota Final</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <!-- Formulario de cierres (se renderiza dinámicamente debajo de la tabla) -->
  <div class="cierre-form" id="cierreForm" style="display:none;"></div>

</div>

<script src="api.js"></script>
<script src="scriptPlanilla.js"></script>

</body>
</html>
