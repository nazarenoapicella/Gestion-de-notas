<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Sistema Escolar</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: #f1f3f4;
      
    }


    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1a73e8;
      color: white;
      padding: 15px 25px;
      font-size: 18px;
    }

    .logo {
      font-weight: bold;
    }

    .user {
      font-size: 14px;
    }


    #container {
      padding: 25px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px);
    }


    .card-header {
      height: 80px;
      color: white;
      padding: 10px;
      display: flex;
      align-items: flex-end;
      font-weight: bold;
    }


    .card-body {
      padding: 15px;
    }

    .card-body p {
      margin: 5px 0;
      font-size: 14px;
      color: #555;
    }


    .card-actions {
  display: flex;
  gap: 10px;
  padding: 15px;
}

.admin-btn {
  background: #1a73e8;
  color: white;
}

.view-btn {
  background: #34a853;
  color: white;
}

button {
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
  font-weight: 500;
}

button:hover {
  transform: scale(1.03);
  opacity: 0.9;
}

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        gap: 5px;
      }
    }
  </style>
</head>

<body>


  <div class="header">
    <div class="logo">Sistema Escolar</div>
    <div id="userInfo" style="display: flex;"></div>
  </div>

  <div id="container">
    <div id="grid" class="grid"></div>
  </div>

  <script src="scriptDashboard.js"></script>

</body>
</html>
